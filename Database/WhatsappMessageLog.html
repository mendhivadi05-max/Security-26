<!DOCTYPE html>
<html lang="en">

<head>
    <style>body { visibility: hidden; }</style>
    <script type="module" src="../Auth/AuthGuard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Message Log</title>
    <link rel="stylesheet" href="../Shared/Theme.css">
    <link rel="stylesheet" href="Database.css">
</head>

<body>
    <main class="page-shell statistics-shell">
        <header class="page-header">
            <div>
                <p class="eyebrow">Database Records</p>
                <h1>WhatsApp Message Log</h1>
            </div>
            <a class="secondary-link" href="../Home/Home">Back to Dashboard</a>
        </header>

        <section class="summary-grid" id="messageSummary">
            <div class="empty-state">Loading WhatsApp message history...</div>
        </section>

        <section class="statistics-toolbar message-filter-panel">
            <div class="filter-grid message-filter-grid">
                <label>
                    Template
                    <select id="templateFilter">
                        <option value="all">All templates</option>
                    </select>
                </label>
                <label>
                    Type
                    <select id="typeFilter">
                        <option value="all">All types</option>
                    </select>
                </label>
                <label>
                    Person
                    <select id="personFilter">
                        <option value="all">All people</option>
                    </select>
                </label>
                <label>
                    Date
                    <input type="date" id="dateFilter">
                </label>
            </div>

            <div class="filter-actions">
                <button type="button" class="secondary-btn" id="clearMessageFilters">Clear filters</button>
            </div>
        </section>

        <section class="analytics-panel">
            <div class="panel-heading">
                <h2>Recent Messages</h2>
                <span id="messageCount"></span>
            </div>
            <div class="message-log-list" id="messageLogList"></div>
        </section>
    </main>

    <script type="module" src="WhatsappMessageLog.js"></script>
    <script type="module" src="../Shared/Preload.js"></script>
</body>

</html>

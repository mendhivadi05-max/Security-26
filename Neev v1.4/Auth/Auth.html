<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Desk Login</title>

    <link rel="stylesheet" href="Auth.css">
</head>

<body>

    <div class="login-box">

        <h1>CLUB DESK</h1>

        <p class="subtitle">
            Access the Secret HQ
        </p>

        <label for="username">
            Username
        </label>

        <input
            type="text"
            id="username"
            placeholder="Enter Username"
        >

        <label for="password">
            Secret Code
        </label>

        <input
            type="password"
            id="password"
            placeholder="Enter Password"
        >

        <button onclick="login()">
            SUBMIT
        </button>

        <p id="error"></p>

    </div>

    <script src="Auth.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <style>body { visibility: hidden; }</style>
    <script type="module" src="../Auth/AuthGuard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Records</title>
    <link rel="stylesheet" href="../Shared/Theme.css">
    <link rel="stylesheet" href="Database.css">
</head>

<body>
    <main class="page-shell records-shell">
        <header class="page-header">
            <div>
                <p class="eyebrow">Database Records</p>
                <h1>Volunteer Records</h1>
            </div>
            <a class="secondary-link" href="../Home/Home">Back to Dashboard</a>
        </header>

        <section class="search-panel">
            <input
                type="search"
                id="volunteerSearch"
                placeholder="Search by name or branch"
                autocomplete="off">
            <div class="search-results" id="searchResults"></div>
        </section>

        <section class="record-detail" id="recordDetail">
            <div class="empty-state">
                Start typing to find a volunteer record.
            </div>
        </section>
    </main>

    <script type="module" src="VolunteerRecords.js"></script>
    <script type="module" src="../Shared/Preload.js"></script>
</body>

</html>

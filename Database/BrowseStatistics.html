<!DOCTYPE html>
<html lang="en">

<head>
    <style>body { visibility: hidden; }</style>
    <script type="module" src="../Auth/AuthGuard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Statistics</title>
    <link rel="stylesheet" href="../Shared/Theme.css">
    <link rel="stylesheet" href="Database.css">
</head>

<body>
    <main class="page-shell statistics-shell">
        <header class="page-header">
            <div>
                <p class="eyebrow">Database Records</p>
                <h1>Browse Statistics</h1>
            </div>
            <a class="secondary-link" href="../Home/Home">Back to Dashboard</a>
        </header>

        <section class="statistics-toolbar">
            <label class="statistics-search">
                Search insights
                <input
                    type="search"
                    id="statisticsSearch"
                    placeholder="Search a meeting, branch, gender, or year">
            </label>

            <div class="filter-grid">
                <label>
                    Meeting
                    <select id="meetingFilter">
                        <option value="all">All meetings</option>
                    </select>
                </label>
                <label>
                    Gender
                    <select id="genderFilter">
                        <option value="all">All genders</option>
                    </select>
                </label>
                <label>
                    Year
                    <select id="yearFilter">
                        <option value="all">All years</option>
                    </select>
                </label>
            </div>
        </section>

        <section class="summary-grid" id="summaryGrid">
            <div class="empty-state">Loading attendance insights...</div>
        </section>

        <section class="analytics-grid">
            <article class="analytics-panel">
                <div class="panel-heading">
                    <h2>Meeting Attendance</h2>
                    <span id="meetingCount"></span>
                </div>
                <div class="meeting-list" id="meetingList"></div>
            </article>

            <article class="analytics-panel">
                <h2>Attendance Breakdown</h2>
                <div class="breakdown-tabs" id="breakdownTabs">
                    <button type="button" class="is-active" data-group="branch">Branch</button>
                    <button type="button" data-group="gender">Gender</button>
                    <button type="button" data-group="year">Year</button>
                </div>
                <div class="breakdown-list" id="breakdownList"></div>
            </article>
        </section>
    </main>

    <script type="module" src="BrowseStatistics.js"></script>
    <script type="module" src="../Shared/Preload.js"></script>
</body>

</html>

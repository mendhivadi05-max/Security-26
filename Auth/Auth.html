<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security'26 Login</title>
    <link rel="stylesheet" href="Auth.css">
</head>
<body>
    <div class="login-box">
        <img src="../Home/Security26Logo.png" alt="Security'26 logo" class="login-logo">
        <h1>Security'26</h1>
        <p class="subtitle">Access the Secret HQ</p>

        <label for="username">Username or email</label>
        <input type="text" id="username" autocomplete="username" placeholder="Enter username">

        <label for="password">Secret Code</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="Enter Password">

        <label>Human Check</label>
        <div id="turnstile-widget" class="turnstile-widget"></div>

        <button type="button" id="submit-button">SUBMIT</button>
        <p id="error"></p>

        <nav class="legal-links" aria-label="Legal links">
            <a href="../Legal/Privacy.html">Privacy</a>
            <a href="../Legal/Terms.html">Terms</a>
            <a href="../Legal/Cookies.html">Cookies</a>
            <a href="../Legal/AcceptableUse.html">Use Policy</a>
        </nav>
    </div>

    <script type="module" src="Auth.js"></script>
    <script
        src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onloadTurnstileCallback"
        defer>
    </script>
</body>
</html>
